<!DOCTYPE html>
<html>
<head>
<title>Frost Bot Terminal</title>

<style>

body{
background:black;
color:#00ff99;
font-family:monospace;
padding:20px;
}

.terminal{
border:1px solid #00ff99;
padding:20px;
border-radius:10px;
min-height:80vh;
box-shadow:0 0 10px #00ff99;
}

#output{
white-space:pre-wrap;
margin-bottom:10px;
}

input{
background:black;
color:#00ff99;
border:none;
outline:none;
font-family:monospace;
font-size:16px;
width:100%;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff99;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>

</head>

<body>

<div class="terminal">

<div id="output">
FROST BOT TERMINAL
Access Granted.
System Ready...

Type "help" for commands.

</div>

<input type="text" id="command" autofocus>

</div>

<script>

const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let cmd = input.value.trim().toLowerCase();

output.innerHTML += "\n> " + cmd;

if(cmd === "help"){
output.innerHTML += "\nCommands:\nhelp\nscan\nstatus\nclear\nlogin\n";
}

else if(cmd === "scan"){
output.innerHTML += "\nScanning system...\n████████████████ 100%\nNo threats detected.\n";
}

else if(cmd === "status"){
output.innerHTML += "\nSystem Status: ONLINE\nFrostBot AI Core: ACTIVE\nNetwork: SECURE\n";
}

else if(cmd === "login"){
output.innerHTML += "\nRedirecting to login...\n";
setTimeout(function(){
window.location.href = "index.html";
},1500);
}

else if(cmd === "clear"){
output.innerHTML = "";
}

else{
output.innerHTML += "\nUnknown command\n";
}

input.value = "";

}

});

</script>

</body>
</html>
