<!DOCTYPE html>
<html>
<head>
<title>Frost Bot Terminal</title>

<style>

body{
background:black;
color:#00ff99;
font-family:monospace;
padding:20px;
  
.terminal{
border:1px solid #00ff99;
padding:20px;
border-radius:10px;
height:70vh;
overflow:auto;
box-shadow:0 0 10px #00ff99;
display:flex;
flex-direction:column;
}

#output{
white-space:pre-wrap;
margin-bottom:15px;
}

input{
background:black;
color:#00ff99;
border:1px solid #00ff99;
padding:10px;
outline:none;
font-family:monospace;
font-size:16px;
width:100%;
margin-top:auto;
}

</style>

</head>

<body>

<div class="terminal">

<div id="output">
FROST BOT TERMINAL
Access Granted.
System Ready...

Type "help" for commands.

</div>

<input id="command" placeholder="type command here..." autofocus>

</div>

<script>

const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let cmd = input.value.trim().toLowerCase();

output.innerHTML += "\n> " + cmd;

if(cmd === "help"){
output.innerHTML += "\nCommands: help, scan, status, clear, login\n";
}

else if(cmd === "scan"){
output.innerHTML += "\nScanning system...\n████████████████ 100%\nNo threats detected.\n";
}

else if(cmd === "status"){
output.innerHTML += "\nSystem Status: ONLINE\nFrostBot Core: ACTIVE\n";
}

else if(cmd === "login"){
output.innerHTML += "\nReturning to login...\n";
setTimeout(function(){
window.location.href="index.html";
},1000);
}

else if(cmd === "clear"){
output.innerHTML="";
}

else{
output.innerHTML += "\nUnknown command\n";
}

input.value="";

}

});

</script>

</body>
</html>
