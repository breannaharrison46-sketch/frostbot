<!DOCTYPE html>
<html>
<head>
<title>Frost Bot Terminal</title>

<style>

body{
background:black;
color:#00ff99;
font-family:monospace;
padding:20px;
}

.terminal{
border:1px solid #00ff99;
padding:20px;
border-radius:10px;
height:70vh;
overflow:auto;
box-shadow:0 0 10px #00ff99;
display:flex;
flex-direction:column;
}

#output{
white-space:pre-wrap;
margin-bottom:15px;
}

input{
background:black;
color:#00ff99;
border:1px solid #00ff99;
padding:10px;
outline:none;
font-family:monospace;
font-size:16px;
width:100%;
margin-top:auto;
}

</style>

</head>

<body>

<div class="terminal">

<div id="output">
FROST BOT TERMINAL
Access Granted.
System Ready...

Type "help" for commands.

</div>

<input id="command" placeholder="type command here..." autofocus>

</div>

<script>

const input = document.getElementById("command");
const output = document.getElementById("output");

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let cmd = input.value.trim().toLowerCase();

output.innerHTML += "\n> " + cmd + "\n";

if(cmd === "help"){
output.innerHTML +=
"Commands:\n"+
"help\n"+
"scan\n"+
"status\n"+
"ai\n"+
"sysinfo\n"+
"clear\n"+
"login\n";
}

else if(cmd === "scan"){
output.innerHTML +=
"Scanning system...\n"+
"████████████████ 100%\n"+
"No threats detected.\n";
}

else if(cmd === "status"){
output.innerHTML +=
"System Status: ONLINE\n"+
"FrostBot Core: ACTIVE\n"+
"Security Layer: ENABLED\n";
}

else if(cmd === "ai"){
output.innerHTML +=
"FrostBot AI: Hello. How can I assist you today?\n";
}

else if(cmd === "sysinfo"){
output.innerHTML +=
"System: FrostBot v1.0\n"+
"Network: Secure\n"+
"User Access: Authorized\n"+
"AI Core: Running\n";
}

else if(cmd === "login"){
output.innerHTML +=
"Returning to login screen...\n";

setTimeout(function(){
window.location.href="index.html";
},1000);
}

else if(cmd === "clear"){
output.innerHTML="";
}

else{
output.innerHTML += "Unknown command\n";
}

input.value="";
}

});

</script>

</body>
</html>
